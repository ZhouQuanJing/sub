name: Sync Nodes from Server

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync_files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================
      # 1. 下载步骤：保留原有的基础文件拉取
      # ==========================================
      - name: Fetch v2ray.txt
        continue-on-error: true
        run: curl -f -o v2ray.txt "${{ secrets.URL }}?v=${{ secrets.TOKEN }}"

      - name: Fetch v2ray_check.txt
        continue-on-error: true
        run: curl -f -o v2ray_check.txt "${{ secrets.URL }}?vc=${{ secrets.TOKEN }}"

      - name: Fetch clash.txt
        continue-on-error: true
        run: curl -f -o clash.txt "${{ secrets.URL }}?c=${{ secrets.TOKEN }}"

      # ==========================================
      # 2. 条件控制层：判断 clash_check.txt 与 clash.txt 状态
      # ==========================================
      - name: Process and Test Clash Config
        run: |
          echo "=== 开始检查 Clash 订阅状态 ==="
          
          # 基础防错：如果原始 clash.txt 压根没下载成功，直接退出
          if [ ! -f "./clash.txt" ] || [ ! -s "./clash.txt" ]; then
            echo "[警告] clash.txt 为空或不存在，跳过后续测试。"
            exit 0
          fi
          
          NEED_TEST=false
          
          # 核心条件1：检查检测后的目标文件 clash_check.txt 是否存在/为空
          if [ ! -f "./clash_check.txt" ] || [ ! -s "./clash_check.txt" ]; then
            echo "[调试] 🔍 未发现有效的 clash_check.txt，必须进行首次生成！"
            NEED_TEST=true
          else
            echo "[调试] 发现已存在本地的 clash_check.txt，开始比对源文件差异..."
            
            # 核心条件2：利用 git diff 对比新下载的 clash.txt 是否被修改
            if git diff --quiet ./clash.txt; then
              echo "[调试] 对比结果：clash.txt 内容未发生变动。"
            else
              echo "[调试] 对比结果：🚀 发现新的 clash.txt 节点内容有更新！"
              NEED_TEST=true
            fi
          fi
          
          # ==========================================
          # 3. 测速与生成流（当 NEED_TEST 为 true 时触发）
          # ==========================================
          if [ "$NEED_TEST" = true ]; then
            echo "[调试] 满足触发条件，开始准备测速环境..."
            
            # 判定测速二进制工具
            if [ -f "./clash-speedtest" ]; then
              echo "[调试] 使用项目根目录预存的二进制文件。"
              chmod +x ./clash-speedtest
            elif [ -f "./clash-speedtest_Linux_x86_64.tar.gz" ]; then
              echo "[调试] 发现本地压缩包，正在解压..."
              tar -zxf ./clash-speedtest_Linux_x86_64.tar.gz && chmod +x ./clash-speedtest
            else
              echo "[调试] 本地无工具，正在从远程下载 v1.8.8..."
              curl -L -o clash-speedtest_Linux_x86_64.tar.gz "https://github.com/faceair/clash-speedtest/releases/download/v1.8.8/clash-speedtest_Linux_x86_64.tar.gz"
              tar -zxf ./clash-speedtest_Linux_x86_64.tar.gz && chmod +x ./clash-speedtest
            fi
            
            # 执行真实代理测试
            if [ -f "./clash-speedtest" ]; then
              echo "[调试] 启动真实 HTTP 代理存活测试..."
              # 【核心修改点】
              # -timeout 2s: 2秒连接不上就判死节点
              # -concurrent 100: 100个节点并发同时测，速度极快
              # -size 1: 关键黑魔法！测速时只下载 1 字节（0 KB），连通后立刻闪断，达到不测速、不跑机场流量的目的
              ./clash-speedtest -c ./clash.txt -output yaml -timeout 2s -concurrent 100 -download-size 1 -min-download-speed 0
              
              if [ -f "./output/config.yaml" ]; then
                mv ./output/config.yaml ./clash_check.txt
                echo "[成功] 已成功生成/更新目标文件：clash_check.txt"
              else
                echo "[错误] 测速工具运行结束，但未生成 output/config.yaml"
              fi
            else
              echo "[错误] 未能成功构建 clash-speedtest 执行文件，停止测试。"
              exit 1
            fi
          else
            echo "[调试] 🌟 条件不满足：clash_check.txt 已存在且基础节点未变动。跳过测速。"
          fi

      # ==========================================
      # 4. 提交推送
      # ==========================================
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          [ -f v2ray.txt ] && git add v2ray.txt
          [ -f clash.txt ] && git add clash.txt
          [ -f v2ray_check.txt ] && git add v2ray_check.txt
          [ -f clash_check.txt ] && git add clash_check.txt
          
          if ! git diff --cached --quiet; then
            echo "[调试] 检测到本地文件库发生变动，准备推送到仓库..."
            git commit -m "Auto-sync nodes: Condition-tested and checked"
            git push
          else
            echo "[调试] 没有检测到内容改变，跳过本次 Commit & Push。"
          fi
