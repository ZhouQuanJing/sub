name: Sync Nodes from Server

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync_files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================
      # 下载步骤：即使某个步骤报错（如404），也会继续往下走
      # ==========================================
      - name: Fetch v2ray.txt
        continue-on-error: true
        run: curl -f -o v2ray.txt "${{ secrets.URL }}?v=${{ secrets.TOKEN }}"

      - name: Fetch clash.txt
        continue-on-error: true
        run: curl -f -o clash.txt "${{ secrets.URL }}?c=${{ secrets.TOKEN }}"

      - name: Fetch v2ray_check.txt
        continue-on-error: true
        run: curl -f -o v2ray_check.txt "${{ secrets.URL }}?vc=${{ secrets.TOKEN }}"

      - name: Fetch clash_check.txt
        continue-on-error: true
        run: curl -f -o clash_check.txt "${{ secrets.URL }}?cc=${{ secrets.TOKEN }}"

      # ==========================================
      # 提交推送：只提交成功更新的文件
      # ==========================================
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 如果文件存在才进行 git add，避免因为某个文件完全没生成过而报错
          [ -f v2ray.txt ] && git add v2ray.txt
          [ -f clash.txt ] && git add clash.txt
          [ -f v2ray_check.txt ] && git add v2ray_check.txt
          [ -f clash_check.txt ] && git add clash_check.txt
          
          # 检查暂存区是否有修改
          if ! git diff --cached --quiet; then
            git commit -m "Auto-sync nodes (partial sync allowed)"
            git push
          else
            echo "No changes detected, skipping commit."
          fi
