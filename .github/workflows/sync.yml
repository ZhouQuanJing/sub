name: Sync Nodes from Server

on:
  schedule:
    - cron: '0 12 * * *' # 北京时间 20:00 执行
  workflow_dispatch:      # 允许手动触发

jobs:
  sync_files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch files from my server
        run: |
          curl -f -o v2ray.txt "${{ secrets.URL }}?v=${{ secrets.TOKEN }}"
          curl -f -o clash.txt "${{ secrets.URL }}?c=${{ secrets.TOKEN }}"
          curl -f -o v2ray_check.txt "${{ secrets.URL }}?vc=${{ secrets.TOKEN }}"
          curl -f -o clash_check.txt "${{ secrets.URL }}?cc=${{ secrets.TOKEN }}"

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add v2ray.txt clash.txt v2ray_check.txt clash_check.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-sync nodes" && git push)
