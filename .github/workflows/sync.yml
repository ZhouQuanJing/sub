name: Sync Nodes from Server

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync_files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================
      # 1. 核心下载流：报错自动跳过，继续下载下一个
      # ==========================================
      - name: Fetch v2ray.txt
        continue-on-error: true
        run: curl -f -o v2ray.txt "${{ secrets.URL }}?v=${{ secrets.TOKEN }}"

      - name: Fetch v2ray_check.txt
        continue-on-error: true
        run: curl -f -o v2ray_check.txt "${{ secrets.URL }}?vc=${{ secrets.TOKEN }}"

      - name: Fetch clash.txt
        continue-on-error: true
        run: curl -f -o clash.txt "${{ secrets.URL }}?c=${{ secrets.TOKEN }}"

      - name: Fetch clash_check.txt
        continue-on-error: true
        run: curl -f -o clash_check.txt "${{ secrets.URL }}?cc=${{ secrets.TOKEN }}" 
        # ⚠️ 注意：上面这行如果你的服务器接口实际不是 ?cc=，请修改为服务器真实的参数

      # ==========================================
      # 2. 提交推送：只保存下载成功且有变动的文件
      # ==========================================
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 检查文件是否存在，存在则暂存
          [ -f v2ray.txt ] && git add v2ray.txt
          [ -f clash.txt ] && git add clash.txt
          [ -f v2ray_check.txt ] && git add v2ray_check.txt
          [ -f clash_check.txt ] && git add clash_check.txt
          
          # 对比是否有文件发生内容变动
          if ! git diff --cached --quiet; then
            echo "[调试] 检测到文件有更新，准备推送到仓库..."
            git commit -m "Auto-sync nodes: Direct fetch complete"
            git push
          else
            echo "[调试] 所有拉取的文件内容均无变化，跳过本次推送。"
          fi
