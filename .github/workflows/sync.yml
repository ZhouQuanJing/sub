name: Sync Nodes from Server

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync_files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================
      # 1. 下载步骤：保留 v2ray 相关文件下载
      # ==========================================
      - name: Fetch v2ray.txt
        continue-on-error: true
        run: curl -f -o v2ray.txt "${{ secrets.URL }}?v=${{ secrets.TOKEN }}"

      - name: Fetch v2ray_check.txt
        continue-on-error: true
        run: curl -f -o v2ray_check.txt "${{ secrets.URL }}?vc=${{ secrets.TOKEN }}"

      - name: Fetch clash.txt
        continue-on-error: true
        run: curl -f -o clash.txt "${{ secrets.URL }}?c=${{ secrets.TOKEN }}"

      # ==========================================
      # 2. 判断 clash.txt 是否更新，并决定是否测试
      # ==========================================
      - name: Process and Test Clash Config
        run: |
          echo "=== 开始检查 clash.txt 的状态 ==="
          
          # 检查文件是否存在且不为空
          if [ ! -f "./clash.txt" ] || [ ! -s "./clash.txt" ]; then
            echo "[警告] 下载的 clash.txt 为空或不存在，跳过本次测试。"
            exit 0
          fi
          
          # 核心判断：利用 git diff 对比新下载的 clash.txt 与本地仓库里的旧文件
          if git diff --quiet ./clash.txt; then
            echo "[调试] 对比结果：clash.txt 内容与上一次完全一致，未发生变动。"
            echo "[调试] 节点无更新，跳过 clash-speedtest 测试以节省算力。"
          else
            echo "[调试] 对比结果：🚀 发现新的 clash.txt 节点内容变动！"
            echo "--- 变更明细（前10行） ---"
            git diff ./clash.txt | head -n 10
            echo "------------------------"
            
            # 环境准备：按照你的逻辑判断测速工具
            echo "[调试] 正在准备测速工具环境..."
            if [ -f "./clash-speedtest" ]; then
              echo "[调试] 使用项目根目录预存的二进制文件。"
              chmod +x ./clash-speedtest
            elif [ -f "./clash-speedtest_Linux_x86_64.tar.gz" ]; then
              echo "[调试] 发现本地压缩包，正在解压..."
              tar -zxf ./clash-speedtest_Linux_x86_64.tar.gz
              chmod +x ./clash-speedtest
            else
              echo "[调试] 本地无工具，正在从远程下载 v1.8.8..."
              curl -L -o clash-speedtest_Linux_x86_64.tar.gz "https://github.com/faceair/clash-speedtest/releases/download/v1.8.8/clash-speedtest_Linux_x86_64.tar.gz"
              tar -zxf ./clash-speedtest_Linux_x86_64.tar.gz
              chmod +x ./clash-speedtest
            fi
            
            # 开始真实代理测试
            if [ -f "./clash-speedtest" ]; then
              echo "[调试] 启动真实 HTTP 代理存活测试..."
              ./clash-speedtest -c ./clash.txt -output yaml
              
              if [ -f "./output/config.yaml" ]; then
                mv ./output/config.yaml ./clash_check.txt
                echo "[成功] 已成功生成最新有效节点的 clash_check.txt"
              else
                echo "[错误] 测速工具运行结束，但未生成 output/config.yaml"
              fi
            else
              echo "[错误] 未能成功构建 clash-speedtest 执行文件，停止测试。"
              exit 1
            fi
          fi

      # ==========================================
      # 3. 提交推送：根据实际产生变化的文件进行持久化
      # ==========================================
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 安全拉入暂存区
          [ -f v2ray.txt ] && git add v2ray.txt
          [ -f clash.txt ] && git add clash.txt
          [ -f v2ray_check.txt ] && git add v2ray_check.txt
          [ -f clash_check.txt ] && git add clash_check.txt
          
          # 检查暂存区是否有任何文件的修改
          if ! git diff --cached --quiet; then
            echo "[调试] 检测到文件库发生变动，准备推送到 GitHub 仓库..."
            git commit -m "Auto-sync nodes: Condition-tested clash proxies"
            git push
          else
            echo "[调试] 没有检测到任何文件有实际内容改变，跳过本次 Commit & Push。"
          fi
